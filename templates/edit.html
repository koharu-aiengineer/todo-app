{% extends "base.html" %}

{% block title %}Todo編集{% endblock %}

{% block content %}
<nav class="breadcrumb">
  <a href="{{ url_for('todo_list', user_id=user_id) }}">&larr; 一覧に戻る</a>
</nav>

<section class="card edit-form">
  <h2>Todoを編集</h2>
  <form method="post" id="edit-form" novalidate>
    <div class="form-group">
      <label for="title">タイトル <span class="required">*</span></label>
      <input type="text" id="title" name="title" required maxlength="200"
             value="{{ todo.title }}">
    </div>
    <div class="form-group">
      <label for="content">内容</label>
      <textarea id="content" name="content" rows="4">{{ todo.content }}</textarea>
    </div>
    <div class="form-group">
      <label>期日・時刻</label>
      <div class="date-time-row">
        <input type="date" id="due_date" name="due_date" value="{{ todo.due_date }}">
        <input type="time" id="due_time" name="due_time" value="{{ todo.due_time }}" placeholder="開始">
        <span class="time-sep">〜</span>
        <input type="time" id="due_end_time" name="due_end_time" value="{{ todo.due_end_time }}" placeholder="終了">
      </div>
      <p class="field-hint">時刻は任意。終了時刻を空白にすると開始+1時間で登録されます。</p>
    </div>
    <div class="form-group">
      <label for="category">カテゴリ <span class="required">*</span></label>
      <select id="category" name="category" required>
        <option value="visit"    {{ 'selected' if todo.category == 'visit'    else '' }}>訪問</option>
        <option value="contract" {{ 'selected' if todo.category == 'contract' else '' }}>契約</option>
        <option value="other"    {{ 'selected' if (todo.category == 'other' or not todo.category) else '' }}>その他</option>
      </select>
    </div>
    <div class="form-group">
      <label for="priority">見込み <span class="required">*</span></label>
      <select id="priority" name="priority" required>
        <option value="◎" {{ 'selected' if todo.priority == '◎'                        else '' }}>◎</option>
        <option value="○" {{ 'selected' if (todo.priority == '○' or not todo.priority) else '' }}>○</option>
        <option value="△" {{ 'selected' if todo.priority == '△'                        else '' }}>△</option>
      </select>
    </div>
    <div class="form-group">
      <label for="status">ステータス</label>
      <select id="status" name="status">
        <option value="pending" {{ 'selected' if todo.status == 'pending' else '' }}>未完了</option>
        <option value="done"    {{ 'selected' if todo.status == 'done'    else '' }}>完了</option>
      </select>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">保存する</button>
      <a href="{{ url_for('todo_list', user_id=user_id) }}" class="btn btn-cancel"
         id="cancel-btn">キャンセル</a>
    </div>
  </form>
</section>

<script>
  // 未保存の変更がある場合に離脱確認を出す
  (function () {
    const form = document.getElementById('edit-form');
    const cancelBtn = document.getElementById('cancel-btn');
    let dirty = false;

    form.addEventListener('input', () => { dirty = true; });
    form.addEventListener('submit', () => { dirty = false; });

    cancelBtn.addEventListener('click', (e) => {
      if (dirty && !confirm('変更が保存されていません。一覧に戻りますか？')) {
        e.preventDefault();
      }
    });
  })();
</script>
{% endblock %}
